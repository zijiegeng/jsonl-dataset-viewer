<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSONL Dataset Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .message-content pre {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
        }
        .message-content code {
            background: #f5f5f5;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
        }
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .accordion-content.open {
            max-height: 1000px;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-6">
    <div class="max-w-5xl mx-auto">
        <!-- Header with Dataset Loader -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-900 mb-4">JSONL Dataset Viewer</h1>
            <div class="flex gap-2 max-w-2xl mx-auto">
                <input
                    type="text"
                    id="datasetPath"
                    placeholder="Enter JSONL file path..."
                    class="flex-1 h-10 rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
                <button
                    id="loadBtn"
                    class="h-10 px-4 py-2 bg-gray-900 text-white rounded-md text-sm font-medium hover:bg-gray-800"
                >
                    Load
                </button>
            </div>
            <div id="loadError" class="mt-2 text-sm text-red-600 hidden"></div>
        </div>

        <!-- Main Content Card -->
        <div id="mainCard" class="bg-white rounded-lg shadow-sm border hidden">
            <div class="p-6">
                <!-- Header with Count and Navigation -->
                <div class="flex items-center justify-between mb-6 pb-4 border-b">
                    <div class="text-sm font-medium text-gray-600">
                        Total: <span id="totalCount" class="text-gray-900 font-semibold">0</span> samples
                    </div>
                    <div class="flex items-center gap-3">
                        <button id="prevBtn" class="h-9 px-3 py-2 border border-gray-300 bg-white rounded-md text-sm font-medium hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                            ← Prev
                        </button>
                        <span class="text-sm font-medium text-gray-700">
                            <span id="currentIndex">1</span> / <span id="totalCountNav">0</span>
                        </span>
                        <button id="nextBtn" class="h-9 px-3 py-2 border border-gray-300 bg-white rounded-md text-sm font-medium hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                            Next →
                        </button>
                        <input
                            type="number"
                            id="jumpInput"
                            placeholder="Jump..."
                            class="w-24 h-9 rounded-md border border-gray-300 px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                        <button id="jumpBtn" class="h-9 px-3 py-2 border border-gray-300 bg-white rounded-md text-sm font-medium hover:bg-gray-50">
                            Go
                        </button>
                    </div>
                </div>

                <!-- Metadata (inline, no separate card) -->
                <div id="metadataSection" class="mb-4 hidden">
                    <div id="metadataContent" class="flex flex-wrap gap-4 text-sm"></div>
                </div>

                <!-- Conversation -->
                <div id="conversationSection" class="hidden">
                    <h2 class="text-xl font-semibold mb-4">Conversation</h2>
                    <div id="conversationContent" class="space-y-3"></div>
                </div>

                <!-- Loading Indicator -->
                <div id="loading" class="text-center py-8 text-gray-600 hidden">
                    Loading sample...
                </div>

                <!-- Error Display -->
                <div id="error" class="bg-red-50 border border-red-200 rounded-lg p-4 text-red-700 hidden"></div>
            </div>
        </div>
    </div>

    <script>
        let totalCount = 0;
        let currentIndex = 0;

        // Icons (SVG)
        const icons = {
            user: '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>',
            assistant: '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M2 5a2 2 0 012-2h7a2 2 0 012 2v4a2 2 0 01-2 2H9l-3 3v-3H4a2 2 0 01-2-2V5z"/><path d="M15 7v2a4 4 0 01-4 4H9.828l-1.766 1.767c.28.149.599.233.938.233h2l3 3v-3h2a2 2 0 002-2V9a2 2 0 00-2-2h-1z"/></svg>',
            system: '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>',
            tool: '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>'
        };

        // Elements
        const datasetPath = document.getElementById('datasetPath');
        const loadBtn = document.getElementById('loadBtn');
        const loadError = document.getElementById('loadError');
        const mainCard = document.getElementById('mainCard');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const jumpInput = document.getElementById('jumpInput');
        const jumpBtn = document.getElementById('jumpBtn');
        const currentIndexEl = document.getElementById('currentIndex');
        const totalCountEl = document.getElementById('totalCount');
        const totalCountNavEl = document.getElementById('totalCountNav');
        const metadataSection = document.getElementById('metadataSection');
        const metadataContent = document.getElementById('metadataContent');
        const conversationSection = document.getElementById('conversationSection');
        const conversationContent = document.getElementById('conversationContent');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');

        // Load dataset
        loadBtn.addEventListener('click', async () => {
            const path = datasetPath.value.trim();
            if (!path) {
                showLoadError('Please enter a file path');
                return;
            }

            loadBtn.disabled = true;
            loadBtn.textContent = 'Loading...';
            hideLoadError();

            try {
                const response = await fetch('/api/load_dataset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path })
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.detail || 'Failed to load dataset');
                }

                const data = await response.json();
                totalCount = data.count;
                totalCountEl.textContent = totalCount;
                totalCountNavEl.textContent = totalCount;
                mainCard.classList.remove('hidden');

                if (totalCount > 0) {
                    await fetchSample(0);
                }
            } catch (err) {
                showLoadError(err.message);
            } finally {
                loadBtn.disabled = false;
                loadBtn.textContent = 'Load';
            }
        });

        // Navigation
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                fetchSample(currentIndex - 1);
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < totalCount - 1) {
                fetchSample(currentIndex + 1);
            }
        });

        jumpBtn.addEventListener('click', () => {
            const index = parseInt(jumpInput.value, 10);
            if (!isNaN(index) && index >= 0 && index < totalCount) {
                fetchSample(index);
                jumpInput.value = '';
            }
        });

        jumpInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                jumpBtn.click();
            }
        });

        datasetPath.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                loadBtn.click();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;

            if (e.key === 'ArrowLeft' && currentIndex > 0) {
                fetchSample(currentIndex - 1);
            } else if (e.key === 'ArrowRight' && currentIndex < totalCount - 1) {
                fetchSample(currentIndex + 1);
            }
        });

        // Fetch sample
        async function fetchSample(index) {
            loading.classList.remove('hidden');
            error.classList.add('hidden');
            metadataSection.classList.add('hidden');
            conversationSection.classList.add('hidden');

            try {
                const response = await fetch(`/api/sample?id=${index}`);
                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.detail || 'Failed to fetch sample');
                }

                const sample = await response.json();
                currentIndex = index;
                currentIndexEl.textContent = currentIndex + 1;

                // Update navigation buttons
                prevBtn.disabled = currentIndex === 0;
                nextBtn.disabled = currentIndex >= totalCount - 1;

                // Render sample
                renderMetadata(sample);
                renderConversation(sample.messages);

                loading.classList.add('hidden');
            } catch (err) {
                loading.classList.add('hidden');
                showError(err.message);
            }
        }

        // Render metadata (inline, exclude 'prompt' field)
        function renderMetadata(sample) {
            const fields = Object.entries(sample).filter(
                ([key]) => key !== 'messages' && key !== 'prompt'
            );

            if (fields.length === 0) {
                metadataSection.classList.add('hidden');
                return;
            }

            metadataContent.innerHTML = fields.map(([key, value]) => `
                <div class="bg-gray-50 px-3 py-2 rounded">
                    <span class="font-semibold text-gray-700">${escapeHtml(key)}:</span>
                    <span class="text-gray-900 ml-1">${
                        typeof value === 'object'
                            ? escapeHtml(JSON.stringify(value))
                            : escapeHtml(String(value))
                    }</span>
                </div>
            `).join('');

            metadataSection.classList.remove('hidden');
        }

        // Render conversation
        function renderConversation(messages) {
            conversationContent.innerHTML = messages.map((msg, idx) =>
                renderMessage(msg, idx)
            ).join('');

            // Add accordion click handlers
            document.querySelectorAll('.accordion-trigger').forEach(trigger => {
                trigger.addEventListener('click', () => {
                    const content = trigger.nextElementSibling;
                    content.classList.toggle('open');
                    const icon = trigger.querySelector('.chevron');
                    icon.style.transform = content.classList.contains('open')
                        ? 'rotate(180deg)'
                        : 'rotate(0deg)';
                });
            });

            conversationSection.classList.remove('hidden');
        }

        // Render single message
        function renderMessage(message, index) {
            const { role, content, tool_calls, tool_call_id, name } = message;

            // Determine styling and icon
            let bgColor = 'bg-gray-50';
            let roleLabel = role;
            let icon = '';

            if (role === 'system') {
                bgColor = 'bg-purple-50';
                roleLabel = 'System';
                icon = icons.system;
            } else if (role === 'user') {
                bgColor = 'bg-blue-50';
                roleLabel = 'User';
                icon = icons.user;
            } else if (role === 'assistant') {
                bgColor = 'bg-green-50';
                roleLabel = 'Assistant';
                icon = icons.assistant;
            } else if (role === 'tool') {
                bgColor = 'bg-gray-100';
                roleLabel = `Tool Result${name ? ` (${name})` : ''}`;
                icon = icons.tool;
            }

            // Parse thinking tags
            let mainContent = content || '';
            let thinkingContent = null;

            if (content && role === 'assistant') {
                const thinkingMatch = content.match(/<thinking>([\s\S]*?)<\/thinking>/);
                if (thinkingMatch) {
                    thinkingContent = thinkingMatch[1].trim();
                    mainContent = content.replace(/<thinking>[\s\S]*?<\/thinking>/, '').trim();
                }
            }

            let html = `
                <div class="${bgColor} rounded-lg p-4">
                    <div class="flex items-center gap-2 mb-3">
                        <div class="text-gray-700">${icon}</div>
                        <div class="font-semibold text-sm uppercase tracking-wide text-gray-700">
                            ${escapeHtml(roleLabel)}
                        </div>
                    </div>
            `;

            // Thinking section (arrow on left)
            if (thinkingContent) {
                html += `
                    <div class="mb-3">
                        <div class="accordion-trigger bg-yellow-100 px-3 py-2 rounded hover:bg-yellow-200 cursor-pointer flex items-center gap-2">
                            <span class="chevron text-xs" style="transition: transform 0.2s">▼</span>
                            <span class="text-sm font-medium">Thinking</span>
                        </div>
                        <div class="accordion-content bg-yellow-50 px-3 rounded-b">
                            <div class="text-sm whitespace-pre-wrap py-2">${escapeHtml(thinkingContent)}</div>
                        </div>
                    </div>
                `;
            }

            // Main content
            if (mainContent) {
                html += `
                    <div class="message-content prose prose-sm max-w-none">
                        ${marked.parse(mainContent)}
                    </div>
                `;
            }

            // Tool calls
            if (tool_calls && tool_calls.length > 0) {
                html += '<div class="mt-3 space-y-2">';
                tool_calls.forEach(call => {
                    let args;
                    try {
                        args = JSON.parse(call.function.arguments);
                    } catch {
                        args = call.function.arguments;
                    }

                    html += `
                        <div class="bg-blue-100 rounded p-3">
                            <div class="font-semibold text-sm mb-1">
                                Tool Call: ${escapeHtml(call.function.name)}
                            </div>
                            <pre class="text-xs bg-white p-2 rounded overflow-x-auto">${
                                typeof args === 'object'
                                    ? escapeHtml(JSON.stringify(args, null, 2))
                                    : escapeHtml(args)
                            }</pre>
                        </div>
                    `;
                });
                html += '</div>';
            }

            html += '</div>';
            return html;
        }

        // Utility functions
        function showLoadError(message) {
            loadError.textContent = message;
            loadError.classList.remove('hidden');
        }

        function hideLoadError() {
            loadError.classList.add('hidden');
        }

        function showError(message) {
            error.textContent = message;
            error.classList.remove('hidden');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
