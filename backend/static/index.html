<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSONL Dataset Viewer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        .md-content p { margin-bottom: 0.5em; }
        .md-content p:last-child { margin-bottom: 0; }
        .md-content h1,.md-content h2,.md-content h3 { font-weight: 600; margin: 0.75em 0 0.25em; }
        .md-content h1 { font-size: 1.2em; }
        .md-content h2 { font-size: 1.1em; }
        .md-content h3 { font-size: 1em; }
        .md-content ul,.md-content ol { padding-left: 1.5em; margin-bottom: 0.5em; }
        .md-content li { margin-bottom: 0.2em; }
        .md-content code { background: #f0f0f0; padding: 0.1em 0.3em; border-radius: 3px; font-size: 0.85em; }
        .md-content pre { background: #f5f5f5; padding: 0.75rem; border-radius: 0.4rem; overflow-x: auto; margin-bottom: 0.5em; }
        .md-content pre code { background: none; padding: 0; }
        .md-content blockquote { border-left: 3px solid #d1d5db; padding-left: 0.75em; color: #6b7280; margin: 0.5em 0; }
        .accordion-content { display: none; }
        .accordion-content.open { display: block; }
        .meta-accordion-content { display: none; }
        .meta-accordion-content.open { display: block; }
        .field-accordion-content { display: none; }
        .field-accordion-content.open { display: block; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen p-6">
    <div class="max-w-5xl mx-auto">
        <!-- Header with Dataset Loader -->
        <div class="text-center mb-6">
            <h1 class="text-3xl font-bold text-gray-900 mb-4">JSONL Dataset Viewer</h1>
            <div class="flex gap-2 max-w-2xl mx-auto">
                <input
                    type="text"
                    id="datasetPath"
                    placeholder="Enter JSONL file path..."
                    class="flex-1 h-10 rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
                <button
                    id="loadBtn"
                    class="h-10 px-4 py-2 bg-gray-900 text-white rounded-md text-sm font-medium hover:bg-gray-800"
                >
                    Load
                </button>
            </div>
            <div id="loadError" class="mt-2 text-sm text-red-600 hidden"></div>
        </div>

        <!-- Main Content Card -->
        <div id="mainCard" class="bg-white rounded-lg shadow-sm border hidden">
            <div class="p-6">
                <!-- Header with Count and Navigation -->
                <div class="flex items-center justify-between mb-6 pb-4 border-b">
                    <div class="text-sm font-medium text-gray-600">
                        Total: <span id="totalCount" class="text-gray-900 font-semibold">0</span> samples
                    </div>
                    <div class="flex items-center gap-3">
                        <button id="prevBtn" class="h-9 px-3 py-2 border border-gray-300 bg-white rounded-md text-sm font-medium hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                            ← Prev
                        </button>
                        <span class="text-sm font-medium text-gray-700">
                            <span id="currentIndex">1</span> / <span id="totalCountNav">0</span>
                        </span>
                        <button id="nextBtn" class="h-9 px-3 py-2 border border-gray-300 bg-white rounded-md text-sm font-medium hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                            Next →
                        </button>
                        <input
                            type="number"
                            id="jumpInput"
                            placeholder="Jump..."
                            class="w-24 h-9 rounded-md border border-gray-300 px-2 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                        />
                        <button id="jumpBtn" class="h-9 px-3 py-2 border border-gray-300 bg-white rounded-md text-sm font-medium hover:bg-gray-50">
                            Go
                        </button>
                    </div>
                </div>

                <!-- Metadata (inline, no separate card) -->
                <div id="metadataSection" class="mb-4 hidden">
                    <div id="metadataContent" class="flex flex-wrap gap-4 text-sm"></div>
                </div>

                <!-- Messages source switcher (shown only when multiple sources exist) -->
                <div id="messagesSwitcher" class="mb-4 hidden">
                    <div class="flex items-center gap-2 bg-yellow-50 border border-yellow-200 rounded-lg px-4 py-2 text-sm">
                        <svg class="w-4 h-4 text-yellow-600 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                        <span class="text-yellow-800 font-medium">检测到多个 messages 字段：</span>
                        <div id="switcherButtons" class="flex gap-2 flex-wrap"></div>
                    </div>
                </div>

                <!-- Conversation -->
                <div id="conversationSection" class="hidden">
                    <h2 class="text-xl font-semibold mb-4">Conversation</h2>
                    <div id="conversationContent" class="space-y-3"></div>
                </div>

                <!-- Bottom Navigation -->
                <div id="bottomNav" class="hidden mt-6 pt-4 border-t flex items-center justify-end gap-3">
                    <button id="prevBtnBottom" class="h-9 px-3 py-2 border border-gray-300 bg-white rounded-md text-sm font-medium hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        ← Prev
                    </button>
                    <span class="text-sm font-medium text-gray-700">
                        <span id="currentIndexBottom">1</span> / <span id="totalCountBottom">0</span>
                    </span>
                    <button id="nextBtnBottom" class="h-9 px-3 py-2 border border-gray-300 bg-white rounded-md text-sm font-medium hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed">
                        Next →
                    </button>
                </div>

                <!-- Loading Indicator -->
                <div id="loading" class="text-center py-8 text-gray-600 hidden">
                    Loading sample...
                </div>

                <!-- Error Display -->
                <div id="error" class="bg-red-50 border border-red-200 rounded-lg p-4 text-red-700 hidden"></div>
            </div>
        </div>
    </div>

    <script>
        let totalCount = 0;
        let currentIndex = 0;
        let currentSample = null;
        let activeMessagesKey = null;

        // Icons (SVG)
        const icons = {
            user: '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"/></svg>',
            assistant: '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M2 5a2 2 0 012-2h7a2 2 0 012 2v4a2 2 0 01-2 2H9l-3 3v-3H4a2 2 0 01-2-2V5z"/><path d="M15 7v2a4 4 0 01-4 4H9.828l-1.766 1.767c.28.149.599.233.938.233h2l3 3v-3h2a2 2 0 002-2V9a2 2 0 00-2-2h-1z"/></svg>',
            system: '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/></svg>',
            tool: '<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>'
        };

        // Elements
        const datasetPath = document.getElementById('datasetPath');
        const loadBtn = document.getElementById('loadBtn');
        const loadError = document.getElementById('loadError');
        const mainCard = document.getElementById('mainCard');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const jumpInput = document.getElementById('jumpInput');
        const jumpBtn = document.getElementById('jumpBtn');
        const currentIndexEl = document.getElementById('currentIndex');
        const totalCountEl = document.getElementById('totalCount');
        const totalCountNavEl = document.getElementById('totalCountNav');
        const metadataSection = document.getElementById('metadataSection');
        const metadataContent = document.getElementById('metadataContent');
        const conversationSection = document.getElementById('conversationSection');
        const conversationContent = document.getElementById('conversationContent');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const bottomNav = document.getElementById('bottomNav');
        const prevBtnBottom = document.getElementById('prevBtnBottom');
        const nextBtnBottom = document.getElementById('nextBtnBottom');
        const currentIndexBottomEl = document.getElementById('currentIndexBottom');
        const totalCountBottomEl = document.getElementById('totalCountBottom');

        // Load dataset
        loadBtn.addEventListener('click', async () => {
            const path = datasetPath.value.trim();
            if (!path) {
                showLoadError('Please enter a file path');
                return;
            }

            loadBtn.disabled = true;
            loadBtn.textContent = 'Loading...';
            hideLoadError();

            try {
                const response = await fetch('/api/load_dataset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path })
                });

                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.detail || 'Failed to load dataset');
                }

                const data = await response.json();
                totalCount = data.count;
                totalCountEl.textContent = totalCount;
                totalCountNavEl.textContent = totalCount;
                mainCard.classList.remove('hidden');

                if (totalCount > 0) {
                    await fetchSample(0);
                }
            } catch (err) {
                showLoadError(err.message);
            } finally {
                loadBtn.disabled = false;
                loadBtn.textContent = 'Load';
            }
        });

        // Navigation
        prevBtn.addEventListener('click', () => {
            if (currentIndex > 0) {
                fetchSample(currentIndex - 1);
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentIndex < totalCount - 1) {
                fetchSample(currentIndex + 1);
            }
        });

        jumpBtn.addEventListener('click', () => {
            const index = parseInt(jumpInput.value, 10);
            if (!isNaN(index) && index >= 0 && index < totalCount) {
                fetchSample(index);
                jumpInput.value = '';
            }
        });

        jumpInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                jumpBtn.click();
            }
        });

        datasetPath.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                loadBtn.click();
            }
        });

        // Bottom navigation buttons
        prevBtnBottom.addEventListener('click', () => {
            if (currentIndex > 0) fetchSample(currentIndex - 1);
        });
        nextBtnBottom.addEventListener('click', () => {
            if (currentIndex < totalCount - 1) fetchSample(currentIndex + 1);
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;

            if (e.key === 'ArrowLeft' && currentIndex > 0) {
                fetchSample(currentIndex - 1);
            } else if (e.key === 'ArrowRight' && currentIndex < totalCount - 1) {
                fetchSample(currentIndex + 1);
            }
        });

        // Fetch sample
        async function fetchSample(index) {
            loading.classList.remove('hidden');
            error.classList.add('hidden');
            metadataSection.classList.add('hidden');
            conversationSection.classList.add('hidden');
            document.getElementById('messagesSwitcher').classList.add('hidden');

            try {
                const response = await fetch(`/api/sample?id=${index}`);
                if (!response.ok) {
                    const data = await response.json();
                    throw new Error(data.detail || 'Failed to fetch sample');
                }

                const sample = await response.json();
                currentIndex = index;
                currentSample = sample;
                activeMessagesKey = sample._messages_sources ? sample._messages_sources[0].key : 'messages';
                currentIndexEl.textContent = currentIndex + 1;

                // Update navigation buttons
                prevBtn.disabled = currentIndex === 0;
                nextBtn.disabled = currentIndex >= totalCount - 1;
                prevBtnBottom.disabled = currentIndex === 0;
                nextBtnBottom.disabled = currentIndex >= totalCount - 1;
                currentIndexBottomEl.textContent = currentIndex + 1;
                totalCountBottomEl.textContent = totalCount;

                // Render switcher if multiple sources
                renderSwitcher(sample._messages_sources);

                // Render sample
                renderMetadata(sample);
                renderConversation(sample.messages);

                loading.classList.add('hidden');
            } catch (err) {
                loading.classList.add('hidden');
                showError(err.message);
            }
        }

        function renderSwitcher(sources) {
            const switcher = document.getElementById('messagesSwitcher');
            const buttons = document.getElementById('switcherButtons');
            if (!sources || sources.length <= 1) {
                switcher.classList.add('hidden');
                return;
            }

            buttons.innerHTML = sources.map(s => `
                <button
                    onclick="switchMessages('${escapeHtml(s.key)}')"
                    id="switcher-btn-${escapeHtml(s.key)}"
                    class="px-3 py-1 rounded text-xs font-medium border transition-colors ${
                        s.key === activeMessagesKey
                            ? 'bg-yellow-600 text-white border-yellow-600'
                            : 'bg-white text-yellow-800 border-yellow-400 hover:bg-yellow-100'
                    }"
                >${escapeHtml(s.key)}</button>
            `).join('');

            switcher.classList.remove('hidden');
        }

        function switchMessages(key) {
            if (!currentSample || !currentSample._messages_sources) return;
            const source = currentSample._messages_sources.find(s => s.key === key);
            if (!source) return;
            activeMessagesKey = key;
            // Re-render switcher buttons to update active state
            renderSwitcher(currentSample._messages_sources);
            renderConversation(source.messages);
        }

        // Render metadata as a single collapsible section with per-field expansion
        function renderMetadata(sample) {
            const fields = Object.entries(sample).filter(
                ([key]) => key !== 'messages' && key !== 'prompt' && !key.startsWith('_')
            );

            if (fields.length === 0) {
                metadataSection.classList.add('hidden');
                return;
            }

            const TRUNCATE_LEN = 150;

            const fieldsHtml = fields.map(([key, value]) => {
                const strVal = typeof value === 'object'
                    ? JSON.stringify(value, null, 2)
                    : String(value);
                const isLong = strVal.length > TRUNCATE_LEN;
                const preview = isLong ? strVal.slice(0, TRUNCATE_LEN) + '…' : strVal;
                const fieldId = 'field-' + key.replace(/[^a-zA-Z0-9]/g, '_') + '_' + Math.random().toString(36).slice(2, 7);

                return `
                    <div class="py-2 border-b border-gray-100 last:border-0">
                        <div class="flex items-baseline gap-2 ${isLong ? 'cursor-pointer hover:bg-gray-50 rounded px-1 -mx-1' : ''}" ${isLong ? `onclick="toggleField('${fieldId}')"` : ''}>
                            <span class="font-mono text-xs font-semibold text-gray-500 flex-shrink-0">${escapeHtml(key)}</span>
                            <span class="text-sm text-gray-800 break-all">${escapeHtml(preview)}</span>
                            ${isLong ? `<span class="text-xs text-blue-500 flex-shrink-0">展开</span>` : ''}
                        </div>
                        ${isLong ? `
                        <div id="${fieldId}" class="field-accordion-content mt-1">
                            <pre class="text-xs text-gray-700 whitespace-pre-wrap break-all bg-gray-50 p-2 rounded">${escapeHtml(strVal)}</pre>
                        </div>` : ''}
                    </div>
                `;
            }).join('');

            metadataContent.innerHTML = `
                <div class="border border-gray-200 rounded-lg overflow-hidden">
                    <div class="flex items-center gap-2 px-4 py-2 bg-gray-50 cursor-pointer hover:bg-gray-100 select-none" onclick="toggleMeta()">
                        <span id="chevronMeta" class="text-xs" style="transition: transform 0.2s; display: inline-block">▶</span>
                        <span class="text-sm font-medium text-gray-700">Other Fields</span>
                        <span class="text-xs text-gray-400">(${fields.length})</span>
                    </div>
                    <div id="metaFieldsContent" class="meta-accordion-content px-4">
                        ${fieldsHtml}
                    </div>
                </div>
            `;

            metadataSection.classList.remove('hidden');
        }

        function toggleMeta() {
            const content = document.getElementById('metaFieldsContent');
            const chevron = document.getElementById('chevronMeta');
            content.classList.toggle('open');
            chevron.style.transform = content.classList.contains('open') ? 'rotate(90deg)' : '';
        }

        function toggleField(fieldId) {
            const content = document.getElementById(fieldId);
            if (content) content.classList.toggle('open');
        }

        // Render conversation
        function renderConversation(messages) {
            conversationContent.innerHTML = messages.map((msg, idx) => {
                try {
                    return renderMessage(msg, idx);
                } catch (e) {
                    return `<div class="border border-red-200 rounded-lg px-4 py-2 text-xs text-red-500">
                        [渲染失败 msg ${idx} role=${msg.role}]: ${escapeHtml(String(e))}
                    </div>`;
                }
            }).join('');

            // Add accordion click handlers
            document.querySelectorAll('.accordion-trigger').forEach(trigger => {
                trigger.addEventListener('click', () => {
                    const content = trigger.nextElementSibling;
                    content.classList.toggle('open');
                    const icon = trigger.querySelector('.chevron');
                    icon.style.transform = content.classList.contains('open')
                        ? 'rotate(180deg)'
                        : 'rotate(0deg)';
                });
            });

            conversationSection.classList.remove('hidden');
            bottomNav.classList.remove('hidden');
        }

        // Render single message
        function renderMessage(message, index) {
            const { role, tool_calls, name } = message;

            // Normalize content: may be string, array of content parts, or null
            let rawContent = message.content;
            let content;
            if (Array.isArray(rawContent)) {
                content = rawContent
                    .filter(part => part && part.type === 'text')
                    .map(part => part.text)
                    .join('\n');
            } else {
                content = rawContent || '';
            }

            // Styling per role
            let bgColor = 'bg-gray-50', borderColor = 'border-gray-200', roleLabel = role, icon = '';
            if (role === 'system')         { bgColor = 'bg-purple-50'; borderColor = 'border-purple-200'; roleLabel = 'System';    icon = icons.system; }
            else if (role === 'user')      { bgColor = 'bg-blue-50';   borderColor = 'border-blue-200';   roleLabel = 'User';      icon = icons.user; }
            else if (role === 'assistant') { bgColor = 'bg-green-50';  borderColor = 'border-green-200';  roleLabel = 'Assistant'; icon = icons.assistant; }
            else if (role === 'tool')      { bgColor = 'bg-gray-100';  borderColor = 'border-gray-300';   roleLabel = `Tool Result${name ? ` (${name})` : ''}`; icon = icons.tool; }

            // Extract <thinking> from assistant content
            let mainContent = content;
            let thinkingContent = null;
            if (content && role === 'assistant') {
                const m = content.match(/<thinking>([\s\S]*?)<\/thinking>/);
                if (m) { thinkingContent = m[1].trim(); mainContent = content.replace(/<thinking>[\s\S]*?<\/thinking>/, '').trim(); }
            }

            const hasBody = mainContent || thinkingContent || (tool_calls && tool_calls.length > 0);
            const msgId = `msg-body-${index}`;

            let html = `<div class="border ${borderColor} rounded-lg overflow-hidden">`;

            // Clickable header
            html += `
                <div class="${bgColor} px-4 py-2 flex items-center justify-between ${hasBody ? 'cursor-pointer hover:brightness-95 select-none' : ''}"
                     ${hasBody ? `onclick="toggleMsg('${msgId}')"` : ''}>
                    <div class="flex items-center gap-2">
                        <div class="text-gray-700">${icon}</div>
                        <div class="font-semibold text-sm uppercase tracking-wide text-gray-700">${escapeHtml(roleLabel)}</div>
                    </div>
                    ${hasBody ? `<span id="${msgId}-chevron" class="text-gray-400 text-xs" style="transition:transform 0.2s;display:inline-block">▲</span>` : ''}
                </div>`;

            if (hasBody) {
                html += `<div id="${msgId}" class="px-4 py-3 space-y-3">`;

                if (thinkingContent) {
                    html += `
                        <div>
                            <div class="accordion-trigger bg-yellow-100 px-3 py-2 rounded hover:bg-yellow-200 cursor-pointer flex items-center gap-2">
                                <span class="chevron text-xs" style="transition:transform 0.2s">▼</span>
                                <span class="text-sm font-medium">Thinking</span>
                            </div>
                            <div class="accordion-content bg-yellow-50 px-3 rounded-b">
                                <div class="text-sm whitespace-pre-wrap py-2">${escapeHtml(thinkingContent)}</div>
                            </div>
                        </div>`;
                }

                if (mainContent) {
                    if (role === 'tool') {
                        html += `<div class="text-sm whitespace-pre-wrap text-gray-800 leading-relaxed">${escapeHtml(mainContent)}</div>`;
                    } else {
                        html += `<div class="md-content text-sm text-gray-800 leading-relaxed">${marked.parse(mainContent)}</div>`;
                    }
                }

                if (tool_calls && tool_calls.length > 0) {
                    tool_calls.forEach(call => {
                        html += `
                            <div class="bg-blue-100 rounded p-3">
                                <div class="font-semibold text-sm mb-1">Tool Call</div>
                                <pre class="text-xs bg-white p-2 rounded overflow-x-auto">${escapeHtml(JSON.stringify(call, null, 2))}</pre>
                            </div>`;
                    });
                }

                html += `</div>`;
            }

            html += `</div>`;
            return html;
        }

        function toggleMsg(id) {
            const body = document.getElementById(id);
            const chevron = document.getElementById(id + '-chevron');
            if (!body) return;
            const collapsed = body.style.display === 'none';
            body.style.display = collapsed ? '' : 'none';
            if (chevron) chevron.style.transform = collapsed ? '' : 'rotate(180deg)';
        }

        // Utility functions
        function showLoadError(message) {
            loadError.textContent = message;
            loadError.classList.remove('hidden');
        }

        function hideLoadError() {
            loadError.classList.add('hidden');
        }

        function showError(message) {
            error.textContent = message;
            error.classList.remove('hidden');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
